<!DOCTYPE html><html lang="en"> <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Claude Statistics</title><meta http-equiv="refresh" content="0;url=/en/"><script>
      (() => {
        const supported = ["en", "zh"];
        const stored = localStorage.getItem("claude-statistics-site-language");
        const detected = (navigator.language || "en").toLowerCase();
        const target = stored || (detected.startsWith("zh") ? "zh" : "en");
        if (supported.includes(target)) {
          window.location.replace(`/${target}/`);
          return;
        }
        window.location.replace("/en/");
      })();
    </script></head> <body></body></html>
