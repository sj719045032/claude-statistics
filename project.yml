name: ClaudeStatistics
options:
  bundleIdPrefix: com.tinystone
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEVELOPMENT_LANGUAGE: en

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

targets:
  ClaudeStatistics:
    type: application
    platform: macOS
    sources:
      - path: ClaudeStatistics
    dependencies:
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tinystone.ClaudeStatistics
        PRODUCT_NAME: Claude Statistics
        MARKETING_VERSION: "1.7.1"
        CURRENT_PROJECT_VERSION: "1.7.1"
        INFOPLIST_FILE: ClaudeStatistics/App/Info.plist
        CODE_SIGN_ENTITLEMENTS: ClaudeStatistics/App/ClaudeStatistics.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: NO
    entitlements:
      path: ClaudeStatistics/App/ClaudeStatistics.entitlements
