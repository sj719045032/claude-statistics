name: ClaudeStatistics
options:
  bundleIdPrefix: com.tinystone
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEVELOPMENT_LANGUAGE: en

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
  MarkdownView:
    url: https://github.com/LiYanan2004/MarkdownView
    from: "2.6.1"
  SwiftSDK:
    url: https://github.com/TelemetryDeck/SwiftSDK
    from: "2.0.0"

targets:
  ClaudeStatisticsKit:
    type: framework
    platform: macOS
    sources:
      - path: Plugins/Sources/ClaudeStatisticsKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tinystone.ClaudeStatisticsKit
        PRODUCT_NAME: ClaudeStatisticsKit
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        DEFINES_MODULE: YES
        BUILD_LIBRARY_FOR_DISTRIBUTION: YES
        SKIP_INSTALL: NO
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Automatic
        SWIFT_STRICT_CONCURRENCY: minimal

  ClaudeAppPlugin:
    type: bundle
    platform: macOS
    sources:
      - path: Plugins/Sources/ClaudeAppPlugin
    dependencies:
      - target: ClaudeStatisticsKit
    info:
      path: Plugins/Sources/ClaudeAppPlugin/Info.plist
      properties:
        CFBundleIdentifier: com.tinystone.ClaudeAppPlugin
        CFBundleName: ClaudeAppPlugin
        CFBundleExecutable: ClaudeAppPlugin
        CFBundlePackageType: BNDL
        NSPrincipalClass: ClaudeAppPlugin
        CSPluginManifest:
          id: com.anthropic.claudefordesktop
          kind: terminal
          displayName: Claude
          version: 1.0.0
          minHostAPIVersion: 0.1.0
          permissions: []
          principalClass: ClaudeAppPlugin
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tinystone.ClaudeAppPlugin
        PRODUCT_NAME: ClaudeAppPlugin
        WRAPPER_EXTENSION: csplugin
        MACH_O_TYPE: mh_bundle
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SKIP_INSTALL: NO
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Automatic
        SWIFT_STRICT_CONCURRENCY: minimal

  CodexAppPlugin:
    type: bundle
    platform: macOS
    sources:
      - path: Plugins/Sources/CodexAppPlugin
    dependencies:
      - target: ClaudeStatisticsKit
    info:
      path: Plugins/Sources/CodexAppPlugin/Info.plist
      properties:
        CFBundleIdentifier: com.tinystone.CodexAppPlugin
        CFBundleName: CodexAppPlugin
        CFBundleExecutable: CodexAppPlugin
        CFBundlePackageType: BNDL
        NSPrincipalClass: CodexAppPlugin
        CSPluginManifest:
          id: com.openai.codex
          kind: terminal
          displayName: Codex
          version: 1.0.0
          minHostAPIVersion: 0.1.0
          permissions: []
          principalClass: CodexAppPlugin
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tinystone.CodexAppPlugin
        PRODUCT_NAME: CodexAppPlugin
        WRAPPER_EXTENSION: csplugin
        MACH_O_TYPE: mh_bundle
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SKIP_INSTALL: NO
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Automatic
        SWIFT_STRICT_CONCURRENCY: minimal

  ClaudeStatistics:
    type: application
    platform: macOS
    sources:
      - path: ClaudeStatistics
    dependencies:
      - target: ClaudeStatisticsKit
        embed: true
      - target: ClaudeAppPlugin
        copy:
          destination: plugins
          subpath: ""
      - target: CodexAppPlugin
        copy:
          destination: plugins
          subpath: ""
      - package: Sparkle
      - package: MarkdownView
        product: MarkdownView
      - package: SwiftSDK
        product: TelemetryDeck
      - sdk: libsqlite3.tbd
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tinystone.ClaudeStatistics
        PRODUCT_NAME: Claude Statistics
        MARKETING_VERSION: "3.1.0"
        CURRENT_PROJECT_VERSION: "3.1.0"
        INFOPLIST_FILE: ClaudeStatistics/App/Info.plist
        CODE_SIGN_ENTITLEMENTS: ClaudeStatistics/App/ClaudeStatistics.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: NO
        SWIFT_STRICT_CONCURRENCY: minimal
    entitlements:
      path: ClaudeStatistics/App/ClaudeStatistics.entitlements
    scheme:
      testTargets:
        - ClaudeStatisticsTests

  ClaudeStatisticsTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ClaudeStatisticsTests
    dependencies:
      - target: ClaudeStatistics
      - target: ClaudeStatisticsKit
    settings:
      base:
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_STRICT_CONCURRENCY: minimal
        PRODUCT_BUNDLE_IDENTIFIER: com.tinystone.ClaudeStatisticsTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Claude Statistics.app/Contents/MacOS/Claude Statistics"
        BUNDLE_LOADER: "$(TEST_HOST)"
