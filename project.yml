  ClaudeStatistics:
    type: application
    platform: macOS
    sources:
      - path: ClaudeStatistics
    dependencies:
      - target: ClaudeStatisticsKit
        embed: true
      - target: ClaudeAppPlugin
        copy:
          destination: plugins
          subpath: ""
      - target: CodexAppPlugin
        copy:
          destination: plugins
          subpath: ""
      - target: VSCodePlugin
        copy:
          destination: plugins
          subpath: ""
      - target: CursorPlugin
        copy:
          destination: plugins
          subpath: ""
      - target: WindsurfPlugin
        copy:
          destination: plugins
          subpath: ""
      - target: TraePlugin
        copy:
          destination: plugins
          subpath: ""
      - target: ZedPlugin
        copy:
          destination: plugins
          subpath: ""
      - target: WarpPlugin
        copy:
          destination: plugins
          subpath: ""
      - target: AlacrittyPlugin
        copy:
          destination: plugins
          subpath: ""
      - target: AppleTerminalPlugin
        copy:
          destination: plugins
          subpath: ""
      - target: KittyPlugin
        copy:
          destination: plugins
          subpath: ""
      - target: WezTermPlugin
        copy:
          destination: plugins
          subpath: ""
      - package: Sparkle
      - package: MarkdownView
        product: MarkdownView
      - package: SwiftSDK
        product: TelemetryDeck
      - sdk: libsqlite3.tbd
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tinystone.ClaudeStatistics
        PRODUCT_NAME: Claude Statistics
        MARKETING_VERSION: "3.1.0"
        CURRENT_PROJECT_VERSION: "3.1.0"
        INFOPLIST_FILE: ClaudeStatistics/App/Info.plist
        CODE_SIGN_ENTITLEMENTS: ClaudeStatistics/App/ClaudeStatistics.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: NO
        SWIFT_STRICT_CONCURRENCY: minimal
    entitlements:
      path: ClaudeStatistics/App/ClaudeStatistics.entitlements
    scheme:
      testTargets:
        - ClaudeStatisticsTests

  ClaudeStatisticsTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ClaudeStatisticsTests
    dependencies:
      - target: ClaudeStatistics
      - target: ClaudeStatisticsKit
    settings:
      base:
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_STRICT_CONCURRENCY: minimal
        PRODUCT_BUNDLE_IDENTIFIER: com.tinystone.ClaudeStatisticsTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Claude Statistics.app/Contents/MacOS/Claude Statistics"
        BUNDLE_LOADER: "$(TEST_HOST)"
